{% extends "base.html" %}
{% block title %}个人中心 - Python 多功能智能助手{% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-card" id="profileCard">
        <h2>👤 个人资料</h2>
        <form id="profileForm" class="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="displayUsername" disabled
                       style="background: var(--color-surface-alt);">
            </div>
            <div class="form-group">
                <label for="profileEmail">邮箱</label>
                <input type="email" id="profileEmail" placeholder="请输入邮箱">
                <span class="form-error" id="emailError"></span>
            </div>
            <div class="form-group">
                <label for="profileAvatar">头像 URL</label>
                <input type="text" id="profileAvatar" placeholder="https://example.com/avatar.jpg">
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
        </form>
        <div id="profileMsg" style="margin-top: 12px;"></div>
    </div>

    <div class="profile-card">
        <h2>🔒 修改密码</h2>
        <form id="passwordForm" class="auth-form">
            <div class="form-group">
                <label for="oldPassword">当前密码</label>
                <input type="password" id="oldPassword" required>
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" required minlength="6">
                <span class="form-error" id="newPasswordError"></span>
            </div>
            <div class="form-group">
                <label for="confirmNewPassword">确认新密码</label>
                <input type="password" id="confirmNewPassword" required>
                <span class="form-error" id="confirmNewPasswordError"></span>
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
        </form>
        <div id="passwordMsg" style="margin-top: 12px;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    'use strict';

    // 加载用户信息
    function loadProfile() {
        API.get('/auth/api/auth/me').then(function(res) {
            var user = res.data.user;
            document.getElementById('displayUsername').value = user.username;
            document.getElementById('profileEmail').value = user.email || '';
            document.getElementById('profileAvatar').value = user.avatar || '';
        }).catch(function(err) {
            showMsg('profileMsg', '加载资料失败: ' + err.message, 'error');
        });
    }

    // 更新资料
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('profileEmail').value.trim();
        var avatar = document.getElementById('profileAvatar').value.trim();

        API.put('/auth/api/auth/profile', { email: email, avatar: avatar || null }).then(function(res) {
            showMsg('profileMsg', '资料更新成功!', 'success');
            // 更新 localStorage
            localStorage.setItem('user', JSON.stringify(res.data.user));
        }).catch(function(err) {
            showMsg('profileMsg', err.message, 'error');
        });
    });

    // 修改密码
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var oldPwd = document.getElementById('oldPassword').value;
        var newPwd = document.getElementById('newPassword').value;
        var confirmPwd = document.getElementById('confirmNewPassword').value;

        document.getElementById('newPasswordError').textContent = '';
        document.getElementById('confirmNewPasswordError').textContent = '';

        if (newPwd.length < 6) {
            document.getElementById('newPasswordError').textContent = '新密码至少6个字符';
            return;
        }
        if (newPwd !== confirmPwd) {
            document.getElementById('confirmNewPasswordError').textContent = '两次密码不一致';
            return;
        }

        API.put('/auth/api/auth/password', {
            old_password: oldPwd,
            new_password: newPwd,
        }).then(function() {
            showMsg('passwordMsg', '密码修改成功!', 'success');
            document.getElementById('passwordForm').reset();
        }).catch(function(err) {
            showMsg('passwordMsg', err.message, 'error');
        });
    });

    function showMsg(elId, msg, type) {
        var el = document.getElementById(elId);
        el.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
    }

    // 初始化
    if (!localStorage.getItem('token')) {
        window.location.href = '/auth/login';
    } else {
        loadProfile();
    }
})();
</script>
{% endblock %}
