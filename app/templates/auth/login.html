{% extends "base.html" %}
{% block title %}登录 - Python 多功能智能助手{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录你的账户继续使用智能助手</p>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="请输入用户名" required autocomplete="username">
                <span class="form-error" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="请输入密码" required autocomplete="current-password">
                <span class="form-error" id="passwordError"></span>
            </div>

            <div class="form-error" id="formError" style="text-align: center;"></div>

            <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                登 录
            </button>
        </form>

        <p class="auth-footer">
            还没有账户？<a href="{{ url_for('auth.register_page') }}">立即注册</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
